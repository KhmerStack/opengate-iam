<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Verify Your Email</title></head>
<body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px;">
  <div style="background:#0D1B2A;padding:20px;border-radius:8px 8px 0 0;">
    <h1 style="color:#00B4D8;margin:0;">OpenGate IAM</h1>
  </div>
  <div style="background:#f9f9f9;padding:30px;border-radius:0 0 8px 8px;">
    <h2>Verify Your Email Address</h2>
    <p>Click below to verify your email. This link expires in 24 hours.</p>
    <a th:href="${verificationUrl}" style="background:#00B4D8;color:white;padding:12px 24px;text-decoration:none;border-radius:4px;">Verify Email</a>
  </div>
</body>
</html>
